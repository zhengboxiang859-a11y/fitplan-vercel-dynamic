name: Unpack FitPlan Vercel Project

on:
  push:
    paths:
      - 'project.b64.part*'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode project archive
        run: |
          cat project.b64.part* > project.b64
          base64 -d project.b64 > project.zip
          unzip -o project.zip
          rm -f project.b64 project.zip project.b64.part*
      - name: Commit unpacked project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Unpack FitPlan Vercel project"
          git push
