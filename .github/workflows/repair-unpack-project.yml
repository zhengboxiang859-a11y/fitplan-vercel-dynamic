name: Repair And Unpack FitPlan Project

on:
  push:
    paths:
      - '.github/workflows/repair-unpack-project.yml'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild archive with repaired first chunk
        run: |
          {
            head -c 654 project.b64.part00
            cat <<'EOF'

EOF
            tail -c +655 project.b64.part00
            cat project.b64.part01 project.b64.part02 project.b64.part03 project.b64.part04 project.b64.part05
          } > project.b64
          base64 -d project.b64 > project.zip
          unzip -o project.zip
      - name: Normalize Windows archive paths
        run: |
          python - <<'PY'
          import os, shutil
          for name in list(os.listdir('.')):
              if '\\' not in name:
                  continue
              target = os.path.join(*name.split('\\'))
              parent = os.path.dirname(target)
              if parent:
                  os.makedirs(parent, exist_ok=True)
              if os.path.exists(target):
                  os.remove(target)
              shutil.move(name, target)
          PY
      - name: Clean archive parts
        run: |
          rm -f project.b64 project.zip project.b64.part*
      - name: Commit unpacked project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Unpack FitPlan Vercel project"
          git push
