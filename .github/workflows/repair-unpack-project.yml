name: Repair And Unpack FitPlan Project

on:
  push:
    paths:
      - '.github/workflows/repair-unpack-project.yml'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild and unpack archive
        run: |
          python - <<'PY'
          import base64
          import pathlib
          import zipfile
          missing = ''
          p0 = pathlib.Path('project.b64.part00').read_text()
          data = p0[:654] + missing + p0[654:]
          for i in range(1, 6):
              data += pathlib.Path(f'project.b64.part{i:02d}').read_text()
          pathlib.Path('project.zip').write_bytes(base64.b64decode(data))
          with zipfile.ZipFile('project.zip') as archive:
              archive.extractall('.')
          for part in pathlib.Path('.').glob('project.b64.part*'):
              part.unlink()
          pathlib.Path('project.zip').unlink(missing_ok=True)
          PY
      - name: Commit unpacked project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Unpack FitPlan Vercel project"
          git push
