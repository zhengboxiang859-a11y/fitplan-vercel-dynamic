name: Normalize FitPlan Project Paths

on:
  push:
    paths:
      - '.github/workflows/repair-unpack-project.yml'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move Windows-style filenames into folders
        run: |
          python - <<'PY'
          import pathlib
          import shutil
          root = pathlib.Path('.')
          for item in list(root.iterdir()):
              if '\\' not in item.name:
                  continue
              target = pathlib.Path(*item.name.split('\\'))
              target.parent.mkdir(parents=True, exist_ok=True)
              if target.exists():
                  target.unlink()
              shutil.move(str(item), str(target))
          PY
      - name: Commit normalized project paths
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Normalize FitPlan project paths"
          git push
